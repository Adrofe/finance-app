spring.application.name=budget
server.port=${SERVER_PORT:8084}

# Logging configuration
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.es.triana.company.budget=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.file.name=budget.log

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=${DATABASE_SCHEMA:budget}

# Flyway Configuration
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=${DATABASE_SCHEMA:budget}
spring.flyway.validate-on-migrate=false

# Security / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/finance-app}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://keycloak:8080/realms/finance-app/protocol/openid-connect/certs}

# Downstream service clients
clients.banking.base-url=${BANKING_API_URL:http://banking:8081}
