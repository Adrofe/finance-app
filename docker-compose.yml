services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - banking
      - investments
      - wealth
      - budget
    expose:
      - "8080"
    networks:
      - finance-net

  banking:
    build:
      context: .
      dockerfile: banking/Dockerfile
    env_file:
      - ./banking/.env
    expose:
      - "8081"
    networks:
      - finance-net

  investments:
    build:
      context: .
      dockerfile: investments/Dockerfile
    env_file:
      - ./investments/.env
    expose:
      - "8082"
    networks:
      - finance-net

  wealth:
    build:
      context: .
      dockerfile: wealth/Dockerfile
    env_file:
      - ./wealth/.env
    expose:
      - "8083"
    networks:
      - finance-net

  budget:
    build:
      context: .
      dockerfile: budget/Dockerfile
    env_file:
      - ./budget/.env
    depends_on:
      - banking
    expose:
      - "8084"
    networks:
      - finance-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_KEYCLOAK_BASE_URL: ${VITE_KEYCLOAK_BASE_URL}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID}
    depends_on:
      - gateway
    expose:
      - "80"
    networks:
      - finance-net

networks:
  finance-net:
    external: true