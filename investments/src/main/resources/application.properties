spring.application.name=investments
server.port=8082

spring.datasource.url=${INVESTMENTS_DB_URL:jdbc:postgresql://localhost:5432/investments}
spring.datasource.username=${INVESTMENTS_DB_USERNAME:postgres}
spring.datasource.password=${INVESTMENTS_DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.schemas=investments
spring.flyway.default-schema=investments
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info
